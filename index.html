<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta name="theme-color" content="#1a1f4a" />
    <title>Edmond Yang</title>

    <link href="assets/img/favicon.png" rel="icon" />
    <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <link href="assets/css/desktop.css" rel="stylesheet" />

    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
</head>

<body>

    <!-- ================= DESKTOP ================= -->
    <main class="desktop" id="desktop">

        <!-- Particle background canvas -->
        <canvas id="canvas1"></canvas>

        <!-- Desktop file icons -->
        <div class="desktop-icons">
            <button class="desktop-icon" data-open="about">
                <span class="icon-glyph"><ion-icon name="person-outline"></ion-icon></span>
                <span class="icon-label">About Me</span>
            </button>
            <button class="desktop-icon" data-open="resume">
                <span class="icon-glyph"><ion-icon name="document-text-outline"></ion-icon></span>
                <span class="icon-label">Resume.pdf</span>
            </button>
            <button class="desktop-icon" data-open="contact">
                <span class="icon-glyph"><ion-icon name="mail-outline"></ion-icon></span>
                <span class="icon-label">Contact</span>
            </button>
        </div>

        <!-- Window container — windows injected here by JS -->
        <div class="window-layer" id="window-layer"></div>

    </main>

    <!-- ================= DOCK ================= -->
    <nav class="dock" id="dock">
        <button class="dock-app app-mail" data-open="contact" aria-label="Mail">
            <img src="assets/img/mail_icon.png" alt="" draggable="false">
        </button>
        <button class="dock-app app-notes" data-open="about" aria-label="Notes">
            <img src="assets/img/note_icon.png" alt="" draggable="false">
        </button>
        <button class="dock-app app-ghostty" data-open="terminal" aria-label="Ghostty">
            <img src="assets/img/ghostty_icon.png" alt="" draggable="false">
        </button>
        <span class="dock-divider"></span>
        <a class="dock-app app-github" href="https://github.com/Edmond0511" target="_blank" rel="noopener"
            aria-label="GitHub">
            <img src="assets/img/github_icon.png" alt="" draggable="false">
        </a>
        <a class="dock-app app-linkedin" href="https://www.linkedin.com/in/edmond-yang11" target="_blank" rel="noopener"
            aria-label="LinkedIn">
            <img src="assets/img/linkedin_icon.png" alt="" draggable="false">
        </a>
        <span class="dock-divider"></span>
        <button class="dock-app app-trash" data-open="trash" aria-label="Trash">
            <img src="assets/img/bin_icon.png" alt="" draggable="false">
        </button>
    </nav>

    <!-- ================= WINDOW TEMPLATES ================= -->
    <template id="tpl-about">
        <article class="content notes-paper">
            <header class="notes-header">
                <h2>Heyo!</h2>
            </header>
            <p>Hey, I'm Edmond</p>
            <p>I'm a 4th year <strong>Computer Engineering</strong> student at the <strong>University of
                    Waterloo</strong></p>
            <p class="notes-section">these days, I'm:</p>
            <ul class="notes-list">

                <li>building <strong>NoteCal</strong>, a React Native nutrition tracking app that automatically
                    parses and calculates your calories and macros from natural-language food entries</li>
                <li>seeking <strong>2026 fall &amp; 2027 new grad</strong> opportunities! <button type="button"
                        class="notes-cta" data-open="contact">Get in touch!</button></li>
            </ul>
            <p class="notes-section">before that, I've:</p>
            <ul class="notes-list">
                <li>built mobile and web features for the dealership & payments platform at <strong>Dealer-FX</strong>
                </li>
                <li>built C#/.NET tooling for inline pipeline inspection at <strong>Zomp Inc.</strong></li>
                <li>wrote Python signal processing pipelines to analyze sensor telemetry and tune BLE/LoRaWAN
                    calibration at <strong>Mero Technologies</strong></li>
                <li>led SEO and event data work across 10+ microsites at <strong>Generis</strong></li>
            </ul>
        </article>
    </template>

    <template id="tpl-resume">
        <article class="content content-flush">
            <div class="resume-toolbar">
                <div class="resume-toolbar-info">
                    <strong>resume.pdf</strong>
                    <span>1 page</span>
                </div>
                <a class="resume-download" href="assets/img/01_EDMOND_YANG_RESUME.pdf"
                    download="Edmond_Yang_Resume.pdf">
                    <svg viewBox="0 0 16 16" width="13" height="13">
                        <path fill="currentColor"
                            d="M8 1v9.2l3.1-3.1 1.1 1L8 12.4 3.8 8.1l1.1-1L8 10.2V1zM2 13h12v2H2z" />
                    </svg>
                    Download
                </a>
            </div>
            <iframe class="resume-frame" src="assets/img/01_EDMOND_YANG_RESUME.pdf#toolbar=0&navpanes=0"
                title="Resume PDF"></iframe>
        </article>
    </template>

    <template id="tpl-contact">
        <article class="content mail-compose">
            <div class="mail-fields">
                <label><span class="mail-label">To:</span><input type="email" value="edmondyang11@gmail.com"
                        readonly /></label>
                <label><span class="mail-label">From:</span><input type="email" name="email" form="contact-form"
                        placeholder="your@email.com" required /></label>
                <label><span class="mail-label">Subject:</span><input type="text" name="Subject" form="contact-form"
                        placeholder="new message" required /></label>
            </div>
            <form id="contact-form" action="https://formspree.io/f/xrgravvr" method="POST" class="mail-body-wrap">
                <textarea name="Message" placeholder="Write your message…" required></textarea>
                <div class="mail-actions">
                    <button type="submit" class="mail-send">
                        <svg viewBox="0 0 16 16" width="12" height="12">
                            <path fill="currentColor" d="M1 8l14-7-5 15-3-6z" />
                        </svg>
                        Send
                    </button>
                </div>
            </form>
        </article>
    </template>

    <template id="tpl-terminal">
        <article class="content terminal-body">
            <div class="terminal-line"><span class="prompt">edmond@ghostty</span> <span class="path">~</span> ❯ whoami
            </div>
            <div class="terminal-out">edmond yang — computer engineering student @ uwaterloo</div>
            <div class="terminal-line"><span class="prompt">edmond@ghostty</span> <span class="path">~</span> ❯ ls
                skills/languages</div>
            <div class="terminal-out">C# C++ Python JavaScript TypeScript SQL SystemVerilog HTML5 CSS</div>
            <div class="terminal-line"><span class="prompt">edmond@ghostty</span> <span class="path">~</span> ❯ ls
                skills/frameworks</div>
            <div class="terminal-out">.NET Core ASP.NET EF Core xUnit Angular React Native Expo</div>
            <div class="terminal-line"><span class="prompt">edmond@ghostty</span> <span class="path">~</span> ❯ ls
                skills/tools</div>
            <div class="terminal-out">Azure Azure DevOps Docker PostgreSQL Git Supabase Postman Google Cloud Platform
            </div>
            <div class="terminal-line"><span class="prompt">edmond@ghostty</span> <span class="path">~</span> ❯ cat
                now.txt</div>
            <div class="terminal-out">seeking 2026 fall &amp; 2027 new grad opportunities · open to chat</div>
            <div class="terminal-line"><span class="prompt">edmond@ghostty</span> <span class="path">~</span> ❯ <span
                    class="cursor"></span></div>
        </article>
    </template>

    <template id="tpl-trash">
        <article class="content finder-list">
            <div class="finder-list-header">
                <span>Name</span>
                <span>Kind</span>
                <span>Date Deleted</span>
            </div>
            <ul class="finder-rows">
                <li class="finder-row">
                    <span class="row-name"><span class="row-icon">🗑️</span><a
                            href="https://www.espn.com/nba/team/stats/_/name/okc/oklahoma-city-thunder" target="_blank"
                            rel="noopener noreferrer">frauds</a></span>
                    <span class="row-meta">Web Link</span>
                    <span class="row-meta">Today</span>
                </li>
            </ul>
            <p class="finder-footer">1 item</p>
        </article>
    </template>

    <!-- Mobile fallback shown when the desktop is too small -->
    <div class="mobile-view" id="mobile-view" hidden>
        <header class="mobile-header">
            <h1>Edmond Yang</h1>
            <p>Computer Engineering · University of Waterloo</p>
        </header>
        <section class="mobile-apps">
            <button class="mobile-app" data-open="about"><span class="mobile-glyph"><ion-icon
                        name="person-outline"></ion-icon></span><span>About</span></button>
            <button class="mobile-app" data-open="resume"><span class="mobile-glyph"><ion-icon
                        name="document-text-outline"></ion-icon></span><span>Resume</span></button>
            <button class="mobile-app" data-open="contact"><span class="mobile-glyph"><ion-icon
                        name="mail-outline"></ion-icon></span><span>Contact</span></button>
            <a class="mobile-app" href="https://github.com/Edmond0511" target="_blank" rel="noopener"><span
                    class="mobile-glyph"><ion-icon name="logo-github"></ion-icon></span><span>GitHub</span></a>
            <a class="mobile-app" href="https://www.linkedin.com/in/edmond-yang11" target="_blank" rel="noopener"><span
                    class="mobile-glyph"><ion-icon name="logo-linkedin"></ion-icon></span><span>LinkedIn</span></a>
        </section>
        <div class="mobile-sheet" id="mobile-sheet" hidden>
            <button class="mobile-close" id="mobile-close" aria-label="Close">✕</button>
            <div class="mobile-sheet-body" id="mobile-sheet-body"></div>
        </div>
    </div>

    <script src="assets/js/desktop.js" defer></script>
    <script src="assets/vendor/cursor/cursor.js" defer></script>
</body>

</html>
